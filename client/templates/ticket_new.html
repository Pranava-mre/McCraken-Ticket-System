{% extends "base.html" %}
{% block content %}
<section class="card">
    <h2>Create Ticket</h2>
    <form method="post" class="form-grid">
        <label>Direction
            <select name="direction" required>
                <option value="IN">IN</option>
                <option value="OUT">OUT</option>
            </select>
        </label>

        <label>Job
            <input type="text" id="job_search" list="jobs_list" placeholder="Type to search jobs" autocomplete="off" required>
            <input type="hidden" name="job_id" id="job_id">
            <datalist id="jobs_list">
                {% for job in jobs %}
                    <option value="{{ job.job_code }} - {{ job.job_name }}" data-id="{{ job.id }}"></option>
                {% endfor %}
            </datalist>
        </label>

        <label>Truck
            <input type="text" id="truck_search" list="trucks_list" placeholder="Type to search trucks" autocomplete="off" required>
            <input type="hidden" name="truck_id" id="truck_id">
            <datalist id="trucks_list">
                {% for truck in trucks %}
                    <option value="{{ truck.truck_number }}" data-id="{{ truck.id }}"></option>
                {% endfor %}
            </datalist>
        </label>

        <label>Material
            <input type="text" id="material_search" list="materials_list" placeholder="Type to search materials" autocomplete="off" required>
            <input type="hidden" name="material_id" id="material_id">
            <datalist id="materials_list">
                {% for material in materials %}
                    <option value="{{ material.material_name }}" data-id="{{ material.id }}"></option>
                {% endfor %}
            </datalist>
        </label>

        <label>Quantity
            <input type="number" step="0.01" name="quantity" required>
        </label>

        <label>Unit
            <input type="text" name="unit" placeholder="tons, yd, etc." required>
        </label>

        <label class="full">Notes
            <textarea name="notes" rows="3"></textarea>
        </label>

        <label class="inline">
            <input type="checkbox" name="auto_print" checked>
            Auto print after save
        </label>

        <div class="actions full">
            <button type="submit">Submit Ticket</button>
        </div>
    </form>
</section>

<section class="card">
    <h3>Refresh Jobs From SQL Server</h3>
    <form method="post" action="{{ url_for('refresh_jobs') }}">
        <button type="submit">Refresh Jobs Cache</button>
    </form>
</section>

<script>
    function bindSearchSelect(inputId, hiddenId, datalistId, fieldLabel) {
        const input = document.getElementById(inputId);
        const hidden = document.getElementById(hiddenId);
        const datalist = document.getElementById(datalistId);
        if (!input || !hidden || !datalist) return;

        const optionMap = new Map();
        for (const option of datalist.options) {
            optionMap.set(option.value.trim(), option.dataset.id);
        }

        function syncHidden() {
            const selectedId = optionMap.get(input.value.trim()) || "";
            hidden.value = selectedId;
            if (selectedId) {
                input.setCustomValidity("");
            }
        }

        input.addEventListener("input", syncHidden);
        input.addEventListener("change", syncHidden);

        const form = input.closest("form");
        if (!form) return;

        form.addEventListener("submit", function (event) {
            syncHidden();
            if (!hidden.value) {
                input.setCustomValidity("Please select a valid " + fieldLabel + " from the list.");
                input.reportValidity();
                event.preventDefault();
                return;
            }
            input.setCustomValidity("");
        });
    }

    bindSearchSelect("job_search", "job_id", "jobs_list", "job");
    bindSearchSelect("truck_search", "truck_id", "trucks_list", "truck");
    bindSearchSelect("material_search", "material_id", "materials_list", "material");
</script>
{% endblock %}
