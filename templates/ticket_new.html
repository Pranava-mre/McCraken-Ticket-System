{% extends "base.html" %}
{% block content %}
<section class="card">
    <h2>Create Ticket</h2>
    <form method="post" class="form-grid" id="new_ticket_form">
        <label>Direction
            <select name="direction" required>
                <option value="IN">IN</option>
                <option value="OUT">OUT</option>
            </select>
        </label>

        <label>Job
            <input type="text" id="job_search" name="job_entry" list="jobs_list" placeholder="Type or enter new job" autocomplete="off" required>
            <input type="hidden" name="job_id" id="job_id">
            <datalist id="jobs_list">
                {% for job in jobs %}
                    <!-- <option value="{{ job.job_code }} - {{ job.job_name }}" data-id="{{ job.id }}" data-customer="{{ job.customer or '' }}"></option> -->
                     <option value="{{ job.job_code }} - {{ job.job_name }}" data-id="{{ job.job_key }}"></option>
                {% endfor %}
            </datalist>
        </label>

        <label>Customer
            <a class="field-link" href="{{ url_for('admin_customers') }}">Add or manage customers</a>
            <input type="text" id="customer_search" name="customer_entry" list="customers_list" placeholder="Select Customer Name" autocomplete="off" required>
            <input type="hidden" name="customer_id" id="customer_id">
            <datalist id="customers_list">
                {% for customer in customers %}
                    <option value="{{ customer.customer_name }}" data-id="{{ customer.id }}"></option>
                {% endfor %}
            </datalist>
        </label>

        <label>Truck
            <a class="field-link" href="{{ url_for('admin_trucks') }}">Add or manage trucks</a>
            <input type="text" id="truck_search" name="truck_entry" list="trucks_list" placeholder="Select Truck Number" autocomplete="off" required>
            <input type="hidden" name="truck_id" id="truck_id">
            <datalist id="trucks_list">
                {% for truck in trucks %}
                    <option value="{{ truck.truck_number }}" data-id="{{ truck.id }}"></option>
                {% endfor %}
            </datalist>
        </label>

        <label>Material
            <input type="text" id="material_search" name="material_entry" list="materials_list" placeholder="Select Material" autocomplete="off" required>
            <input type="hidden" name="material_id" id="material_id">
            <datalist id="materials_list">
                {% for material in materials %}
                    <option value="{{ material.material_name }}" data-id="{{ material.id }}"></option>
                {% endfor %}
            </datalist>
        </label>

        <label>Quantity
            <input type="number" name="quantity" value="1" required>
        </label>

        <label>Unit
            <input type="text" name="unit" value="Load" required>
        </label>
        <!-- NEW SECTION -->
        <label class="inline">
            <input type="checkbox" id="use_now" name="use_now" checked>
            Use Current Date & Time
        </label>

        <label id="custom_date_label" style="display:none;">
            Select Date & Time
            <input type="datetime-local" name="custom_datetime" id="custom_datetime">
        </label>

        <label class="full">Notes
            <textarea name="notes" rows="3"></textarea>
        </label>

        <label class="inline">
            <input type="checkbox" id="auto_print" name="auto_print" checked>
            Auto print after save
        </label>

        <div class="actions full">
            <button type="submit">Submit Ticket</button>
        </div>
    </form>
</section>

<section class="card">
    <h3>Refresh Jobs From SQL Server</h3>
    <form method="post" action="{{ url_for('refresh_jobs') }}">
        <button type="submit">Refresh Jobs Cache</button>
    </form>
</section>

<script>
    function bindSearchSelect(inputId, hiddenId, datalistId, fieldLabel) {
        const input = document.getElementById(inputId);
        const hidden = document.getElementById(hiddenId);
        const datalist = document.getElementById(datalistId);
        if (!input || !hidden || !datalist) return;

        function findSelectedOption() {
            const wanted = input.value.trim();
            if (!wanted) return null;

            for (const option of datalist.options) {
                if ((option.value || "").trim() === wanted) {
                    return option;
                }
            }
            return null;
        }

        function syncHidden() {
            const selected = findSelectedOption();
            const selectedId = selected ? (selected.dataset.id || "") : "";
            hidden.value = selectedId;
            input.setCustomValidity("");

            // if (inputId === "job_search" && selected) {
            //     const customerInput = document.getElementById("customer");
            //     if (customerInput && selected.customer) {
            //         customerInput.value = selected.customer;
            //     }
            // }
        }

        input.addEventListener("input", syncHidden);
        input.addEventListener("change", syncHidden);
    }

    bindSearchSelect("job_search", "job_id", "jobs_list", "job");
    bindSearchSelect("customer_search", "customer_id", "customers_list", "customer");
    bindSearchSelect("truck_search", "truck_id", "trucks_list", "truck");
    bindSearchSelect("material_search", "material_id", "materials_list", "material");


    const useNowCheckbox = document.getElementById("use_now");
    const customDateLabel = document.getElementById("custom_date_label");
    const customDateInput = document.getElementById("custom_datetime");

    function toggleDateInput() {
        if (useNowCheckbox.checked) {
            customDateLabel.style.display = "none";
            customDateInput.required = false;
        } else {
            customDateLabel.style.display = "block";
            customDateInput.required = true;
        }
    }

    useNowCheckbox.addEventListener("change", toggleDateInput);
    toggleDateInput();

    const directionSelect = document.querySelector('select[name="direction"]');
    const materialDatalist = document.getElementById("materials_list");

    async function loadMaterials(direction) {
        const res = await fetch(`/materials?direction=${direction}`);
        const data = await res.json();

        // Clear existing options
        materialDatalist.innerHTML = "";

        // Add new options
        data.materials.forEach(m => {
            const option = document.createElement("option");
            option.value = m.name;
            option.dataset.id = m.id;
            materialDatalist.appendChild(option);
        });

        // Avoid keeping a stale material/id pair when the direction changes.
        document.getElementById("material_search").value = "";
        document.getElementById("material_id").value = "";
    }

    // Initial load
    loadMaterials("IN");

    // On change
    directionSelect.addEventListener("change", (e) => {
        loadMaterials(e.target.value);
    });

    const newTicketForm = document.getElementById("new_ticket_form");
    const autoPrintCheckbox = document.getElementById("auto_print");

    if (newTicketForm && autoPrintCheckbox) {
        newTicketForm.addEventListener("submit", () => {
            if (autoPrintCheckbox.checked) {
                const popupName = "ticket_print_popup";
                newTicketForm.target = popupName;
                const popup = window.open("", popupName, "width=980,height=780");
                if (popup) popup.focus();
            } else {
                newTicketForm.target = "_self";
            }
        });
    }

</script>
{% endblock %}
