<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In – Dump Ticket System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { background: #f4f5f7; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .login-card { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.15); padding: 40px 36px; width: 100%; max-width: 360px; }
        .login-card h2 { margin: 0 0 6px; font-size: 1.4rem; }
        .login-card .brand { color: #555; font-size: .9rem; margin: 0 0 24px; }
        .login-card label { display: block; font-weight: 600; margin-bottom: 4px; font-size: .9rem; }
        .login-card input[type=text],
        .login-card input[type=password] { width: 100%; box-sizing: border-box; padding: 9px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; margin-bottom: 16px; }
        .login-card button { width: 100%; padding: 10px; font-size: 1rem; background: #1a6fba; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        .login-card button:hover { background: #155a9a; }
        .flash.error { background: #fde8e8; color: #c0392b; border: 1px solid #f5b7b1; padding: 8px 12px; border-radius: 4px; margin-bottom: 16px; font-size: .9rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Dump Ticket System</h2>
        <p class="brand">McCracken Materials, LLC</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        <form method="post">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autofocus required autocomplete="username">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
